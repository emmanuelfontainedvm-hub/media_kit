<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Media Kit · Dr. Emmanuel Fontaine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#382547; --purple-2:#5a4470; --purple-3:#7d6494; --purple-soft:#efeaf4;
  --coral:#FF7F50; --coral-ink:#c14a1f; --coral-soft:#fff1ea;
  --ink:#2b2230; --muted:#7a7382; --muted-2:#9a93a3;
  --canvas:#f6f3ef; --card:#ffffff; --line:#ece7f0; --line-2:#e2dbe9;
  --radius:20px; --radius-sm:14px; --radius-xs:10px;
  --shadow:0 1px 2px rgba(56,37,71,.04), 0 10px 30px rgba(56,37,71,.06);
  --shadow-sm:0 1px 2px rgba(56,37,71,.05), 0 4px 14px rgba(56,37,71,.05);
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;background:var(--canvas);font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{margin:0;font-weight:700;color:var(--purple)}
.muted{color:var(--muted)}
:focus-visible{outline:2px solid var(--coral);outline-offset:2px;border-radius:4px}

.shell{max-width:1240px;margin:0 auto;padding:26px 22px 60px;display:grid;gap:22px;grid-template-columns:380px 1fr;align-items:start}
.dash{display:flex;flex-direction:column;gap:18px}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.card-pad{padding:20px 22px}
.card-title{font-size:16px;font-weight:700;color:var(--purple);letter-spacing:-.01em}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}

.info{width:15px;height:15px;border-radius:50%;border:1.4px solid var(--muted-2);color:var(--muted);font-size:10px;font-weight:700;display:inline-grid;place-items:center;cursor:default;flex:none;font-style:normal}
.ph{font-size:9px;font-weight:700;letter-spacing:.03em;color:var(--coral-ink);background:var(--coral-soft);padding:1px 5px;border-radius:5px;text-transform:uppercase;vertical-align:middle;white-space:nowrap}

/* PROFILE */
.profile{position:sticky;top:22px;background:var(--card);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);overflow:hidden}
@media(max-width:920px){ .profile{position:static} }
.p-toolbar{display:flex;align-items:center;gap:8px;padding:12px 14px}
.p-toolbar .site{font-size:12px;font-weight:700;color:var(--purple);letter-spacing:.02em;margin-right:auto;padding-left:4px}
.tbtn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 12px;border-radius:10px;background:var(--purple-soft);color:var(--purple);font-size:12px;font-weight:700;border:none;cursor:pointer;transition:background .15s}
.tbtn:hover{background:#e4dcee}
.tbtn svg{width:14px;height:14px}
.tbtn.icon{width:34px;padding:0;justify-content:center}
.p-cover{height:120px;background:radial-gradient(120% 140% at 15% 0%, #4a3160 0%, var(--purple) 55%, #2a1a3a 100%);position:relative}
.p-cover::after{content:"";position:absolute;inset:0;background:radial-gradient(60% 80% at 85% 120%, rgba(255,127,80,.35), transparent 60%)}
.p-body{padding:0 24px 26px;text-align:center;margin-top:-58px;position:relative}
.p-avatar{width:116px;height:116px;border-radius:50%;margin:0 auto;border:5px solid var(--card);box-shadow:var(--shadow-sm);object-fit:cover;object-position:center 20%;background:var(--purple-soft)}
.p-name{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px}
.p-name h1{font-size:24px;letter-spacing:-.02em}
.verified{width:22px;height:22px;flex:none}
.p-creds{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--purple-2);margin-top:6px}
.p-badge{display:inline-flex;align-items:center;gap:7px;margin-top:12px;font-size:11px;font-weight:600;color:var(--purple-2);background:var(--purple-soft);padding:5px 11px;border-radius:999px}
.p-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--coral)}
.p-loc{font-size:12.5px;color:var(--muted);margin-top:12px;line-height:1.5;max-width:30ch;margin-left:auto;margin-right:auto}
.p-total{margin-top:14px;font-size:14px;color:var(--muted)}
.p-total b{color:var(--purple);font-size:16px;font-weight:800}
.p-sub{margin-top:6px;font-size:12px;color:var(--muted);font-weight:600}
.p-sub b{color:var(--purple)}
.p-channels{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
.chan{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border:1px solid var(--line-2);border-radius:12px;font-size:12.5px;font-weight:700;color:var(--purple);background:#fff}
.chan b{color:var(--purple)}
.p-topics{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.topic{font-size:12px;font-weight:600;color:var(--purple-2);background:var(--purple-soft);padding:6px 13px;border-radius:20px}
.p-bio{font-size:13.5px;color:var(--ink);line-height:1.6;margin-top:16px}
.p-cta{display:block;margin-top:18px;background:var(--purple);color:#fff;font-size:14px;font-weight:700;letter-spacing:.02em;padding:15px;border-radius:14px;text-align:center;transition:transform .12s,box-shadow .12s;box-shadow:0 8px 20px rgba(56,37,71,.22)}
.p-cta:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(56,37,71,.28)}
.p-cta2{display:block;margin-top:10px;background:#fff;color:var(--purple);border:1px solid var(--line-2);font-size:13px;font-weight:700;padding:13px;border-radius:14px;text-align:center}
.p-cta2:hover{background:var(--canvas)}

/* RATES / PARTNER */
.rate-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 0;border-top:1px solid var(--line)}
.rate-row:first-of-type{border-top:none}
.rate-l .rt{font-size:14px;font-weight:600;color:var(--ink)}
.rate-l .rd{font-size:12px;color:var(--muted);margin-top:2px}
.rate-btn{display:inline-flex;align-items:center;gap:7px;background:var(--purple);color:#fff;font-size:12.5px;font-weight:700;padding:9px 14px;border-radius:10px;white-space:nowrap;transition:background .15s}
.rate-btn:hover{background:var(--purple-2)}
.rate-btn.ghost{background:#fff;color:var(--purple);border:1px solid var(--line-2)}
.rate-btn.ghost:hover{background:var(--canvas)}

/* CAMPAIGN OFFER */
.offer-list{display:flex;flex-direction:column;margin:0 0 4px}
.offer-item{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line);font-size:13.5px;color:var(--ink);font-weight:500}
.offer-item:first-child{border-top:none}
.offer-item .ck{flex:none;width:19px;height:19px;border-radius:6px;background:var(--coral-soft);color:var(--coral-ink);display:grid;place-items:center;font-size:11px;font-weight:800;margin-top:1px}

/* CONTENT SAMPLES */
.samples{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1080px){ .samples{grid-template-columns:repeat(2,1fr)} }
@media(max-width:560px){ .samples{grid-template-columns:1fr} }
.sample{display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;transition:border-color .15s,box-shadow .15s,transform .12s}
.sample:hover{border-color:var(--coral);box-shadow:var(--shadow);transform:translateY(-2px)}
.sample:focus-visible{outline:2px solid var(--coral);outline-offset:2px}
.sample .s-thumb{aspect-ratio:16/9;width:100%;background:var(--purple-soft);position:relative;overflow:hidden;flex:none}
.sample .s-thumb img{width:100%;height:100%;object-fit:cover}
/* typographic tile for sources whose thumbnail cannot be stored locally */
.sample .s-fallback{width:100%;height:100%;display:flex;align-items:flex-end;padding:13px 14px;background:radial-gradient(120% 140% at 15% 0%, #4a3160 0%, var(--purple) 60%, #2a1a3a 100%)}
.sample .s-fallback span{font-size:11.5px;font-weight:600;color:#d9cfe6;line-height:1.45}
.sample .s-body{padding:13px 15px 14px;display:flex;flex-direction:column;gap:7px;flex:1}
.sample .s-fmt{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--coral-ink);background:var(--coral-soft);padding:3px 7px;border-radius:5px;align-self:flex-start}
.sample .s-title{font-size:13px;font-weight:700;color:var(--purple);line-height:1.4;letter-spacing:-.01em;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.sample .s-link{margin-top:auto;padding-top:4px;font-size:11.5px;font-weight:700;color:var(--purple-2);transition:color .15s}
.sample:hover .s-link{color:var(--coral-ink)}

/* BRANDS */
.brands{display:flex;flex-wrap:wrap;gap:10px}
.brand{flex:1;min-width:120px;height:64px;border:1px solid var(--line);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;padding:12px 14px;background:#fff}
.brand img{max-height:34px;width:auto;object-fit:contain}
.brand-note,.note{font-size:10.5px;color:var(--muted-2);margin-top:12px;line-height:1.5}

/* TILES */
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px 16px;box-shadow:var(--shadow-sm)}
.tile-head{display:flex;align-items:center;justify-content:space-between}
.tile-ic{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--muted)}
.tile-ic svg{width:15px;height:15px;color:var(--purple-2)}
.tile-val{font-size:26px;font-weight:800;color:var(--purple);letter-spacing:-.03em;margin-top:12px;line-height:1}
.tile-val .u{font-size:13px;font-weight:700;color:var(--coral)}
.tile-sub{font-size:11px;color:var(--muted);margin-top:5px}

/* ===== AUDIENCE ===== */
.toggle{display:inline-flex;background:var(--purple-soft);border-radius:11px;padding:3px}
.toggle button{border:none;background:none;font:inherit;font-size:12.5px;font-weight:700;color:var(--purple-2);padding:8px 15px;border-radius:9px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.toggle button svg{width:14px;height:14px}
.toggle button[aria-pressed="true"]{background:#fff;color:var(--purple);box-shadow:var(--shadow-sm)}

.selwrap{position:relative;display:inline-flex;align-items:center}
.selwrap svg{position:absolute;right:11px;pointer-events:none;width:14px;height:14px;color:var(--purple)}
select.country{appearance:none;-webkit-appearance:none;font-family:var(--sans);font-size:13px;font-weight:700;color:var(--purple);background:var(--purple-soft);border:1px solid var(--line-2);border-radius:10px;padding:9px 34px 9px 13px;cursor:pointer;outline:none;max-width:220px}
select.country:focus-visible{border-color:var(--coral)}

.geo-readout{background:var(--purple);border-radius:var(--radius-sm);padding:18px 20px;color:#fff;margin:4px 0 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.geo-readout .flag{font-size:38px;line-height:1}
.geo-readout .big{font-size:32px;font-weight:800;letter-spacing:-.02em;line-height:1}
.geo-readout .lbl{font-size:11.5px;color:#d9cfe6;text-transform:uppercase;letter-spacing:.06em;margin-top:6px}
.geo-readout .subline{font-size:11px;color:#c4b6d4;margin-top:7px;max-width:38ch;line-height:1.45}
.geo-readout .col{flex:1;min-width:150px}
.geo-meta{display:flex;flex-wrap:wrap;gap:8px}
.geo-meta .gm{font-size:11.5px;font-weight:600;color:var(--purple);background:#fff;padding:7px 11px;border-radius:8px}
.geo-meta .gm b{color:var(--coral-ink)}

/* channel mix */
.mixbar{display:flex;height:18px;border-radius:9px;overflow:hidden;border:1px solid var(--line);background:var(--canvas)}
.mixseg{height:100%;transition:width .5s ease}
.mixlegend{display:flex;flex-wrap:wrap;gap:9px 16px;margin-top:13px}
.mixlegend .ml{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink);white-space:nowrap}
.mixlegend .mk{width:11px;height:11px;border-radius:3px;flex:none}
.mixlegend .mv{font-weight:700;color:var(--purple)}
.mixlegend .est-dot{font-size:8.5px;color:var(--coral-ink);font-weight:700;text-transform:lowercase;white-space:nowrap;background:var(--coral-soft);padding:1px 5px;border-radius:4px}

/* subcards / demographics */
.aud-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px}
@media(max-width:560px){ .aud-grid{grid-template-columns:1fr} }
.subcard{background:var(--canvas);border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px 16px}
.subcard .sh{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--purple);margin-bottom:14px}
.subcard .sh svg{width:15px;height:15px}
.subcard .sh .tag{font-size:10px;font-weight:600;color:var(--muted-2);text-transform:none;letter-spacing:0}

.donut-wrap{display:flex;align-items:center;gap:18px}
.donut{width:118px;height:118px;border-radius:50%;flex:none;position:relative;background:conic-gradient(var(--coral) 0 var(--male,23%), var(--purple) var(--male,23%) 100%)}
.donut::after{content:"";position:absolute;inset:22px;border-radius:50%;background:var(--canvas)}
.legend{display:flex;flex-direction:column;gap:10px}
.legend .lg{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink)}
.legend .lg .k{width:11px;height:11px;border-radius:3px;flex:none}
.legend .lg .v{margin-left:auto;font-weight:700;color:var(--purple)}
.legend .lg .name{min-width:56px}

.hbars{display:flex;flex-direction:column;gap:9px}
.hbar{display:grid;grid-template-columns:52px 1fr 40px;align-items:center;gap:11px}
.hbar .hb-l{font-size:12px;color:var(--ink);font-weight:600}
.hbar .hb-t{height:11px;background:#fff;border:1px solid var(--line);border-radius:6px;overflow:hidden}
.hbar .hb-f{height:100%;background:var(--purple);border-radius:6px;width:0;transition:width .8s cubic-bezier(.2,.7,.2,1)}
.hbar .hb-v{font-size:12px;font-weight:700;color:var(--purple);text-align:right}

/* professional composition + mini-stats */
.pro{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:4px}
.pro .p{background:var(--canvas);border:1px solid var(--line);border-radius:12px;padding:14px 13px}
.pro .pn{font-size:21px;font-weight:800;color:var(--purple);line-height:1}
.pro .pn b{color:var(--coral)}
.pro .pl{font-size:10px;color:var(--muted);margin-top:6px;line-height:1.4}
.pro3{grid-template-columns:repeat(3,1fr)}
@media(max-width:560px){.pro,.pro3{grid-template-columns:1fr 1fr}}

/* country rows */
.crow{display:grid;grid-template-columns:22px 1fr 66px;align-items:center;gap:10px 10px;padding:8px 10px;border-radius:10px;transition:background .15s;cursor:pointer}
.crow:hover{background:var(--purple-soft)}
.crow .cf{font-size:16px}
.crow .cn{font-size:13px;font-weight:600;color:var(--ink)}
.crow .cv{font-size:12.5px;font-weight:700;color:var(--purple);text-align:right}
.crow .cbar{grid-column:2 / 4;height:8px;background:var(--purple-soft);border-radius:5px;overflow:hidden;margin-top:2px}
.crow .cbar i{display:block;height:100%;background:var(--purple-3);border-radius:5px;transition:width .5s ease}
.crow.active{background:var(--coral-soft)}
.crow.active .cn{color:var(--coral-ink)}
.crow.active .cbar i{background:var(--coral)}
.crow.rest{opacity:.72}
.crow.rest .cf{filter:grayscale(1)}

/* proof of performance (renders only when a case is published) */
.cases{display:flex;flex-direction:column;gap:14px}
.case{border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px 18px;background:#fff}
.case h3{font-size:15px}
.case .kick{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--coral-ink);margin-bottom:6px}
.case .cmeta{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.5}
.case .res{display:flex;gap:22px;margin-top:13px;border-top:1px solid var(--line);padding-top:13px}
.case .res .rv{font-size:20px;font-weight:800;color:var(--purple);line-height:1}
.case .res .rl{font-size:10.5px;color:var(--muted);margin-top:4px}
.case .disc{font-size:10px;color:var(--muted-2);margin-top:11px;font-style:italic;line-height:1.5}

/* proof-of-performance: featured case + metric strip */
.case.feature{border-color:var(--purple-3);box-shadow:0 1px 2px rgba(56,37,71,.05),0 8px 24px rgba(56,37,71,.09)}
.case.feature .kick{color:#fff;background:var(--purple);display:inline-block;padding:4px 9px;border-radius:6px}
.case .blurb{font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:9px}
.case .res{flex-wrap:wrap;gap:14px 26px}
.case.feature .res .rv{font-size:23px}

/* progressive disclosure */
.dd-note{font-size:11.5px;color:var(--muted);margin:-4px 0 14px;line-height:1.5}
.dd{border-top:1px solid var(--line)}
.dd:first-of-type{border-top:none}
.dd>summary{cursor:pointer;list-style:none;display:flex;align-items:flex-start;gap:12px;padding:15px 0}
.dd>summary::-webkit-details-marker{display:none}
.dd .dd-txt{flex:1;min-width:0}
.dd .dd-t{display:block;font-size:14px;font-weight:700;color:var(--purple);letter-spacing:-.01em}
.dd .dd-s{display:block;font-size:12px;color:var(--muted);margin-top:3px;line-height:1.45}
.dd .dd-x{flex:none;width:26px;height:26px;border-radius:8px;background:var(--purple-soft);color:var(--purple);display:grid;place-items:center;font-size:15px;font-weight:800;line-height:1;transition:transform .18s,background .15s;margin-top:1px}
.dd>summary:hover .dd-x{background:#e4dcee}
.dd[open]>summary .dd-x{transform:rotate(45deg);background:var(--coral-soft);color:var(--coral-ink)}
.dd[open]>summary .dd-t{color:var(--coral-ink)}
.dd-body{padding:0 0 20px 38px}
@media(max-width:520px){ .dd-body{padding-left:0} }
.dd-body p{font-size:13px;color:var(--ink);line-height:1.65;margin:0 0 11px}
.dd-body p:last-child{margin-bottom:0}
.dd-pull{font-size:15px;font-weight:700;color:var(--purple);letter-spacing:-.01em;border-left:3px solid var(--coral);padding:2px 0 2px 13px;margin:15px 0}
.dd-points{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:15px 0}
@media(max-width:640px){ .dd-points{grid-template-columns:1fr} }
.dd-points .dp{background:var(--canvas);border:1px solid var(--line);border-radius:12px;padding:13px 14px}
.dd-points .dp .dt{font-size:12.5px;font-weight:700;color:var(--purple);margin-bottom:5px}
.dd-points .dp .dd2{font-size:11.5px;color:var(--muted);line-height:1.55}
.dd-num{display:flex;flex-direction:column;gap:11px;margin:15px 0}
.dd-num .dn{display:flex;gap:12px;align-items:flex-start}
.dd-num .dn .ix{flex:none;width:24px;height:24px;border-radius:7px;background:var(--purple);color:#fff;font-size:12px;font-weight:800;display:grid;place-items:center}
.dd-num .dn .dt{font-size:12.5px;font-weight:700;color:var(--purple)}
.dd-num .dn .dd2{font-size:11.5px;color:var(--muted);line-height:1.55;margin-top:3px}

/* methodology disclosure */
.methods summary{cursor:pointer;font-size:14px;font-weight:700;color:var(--purple);list-style:none;display:flex;align-items:center;gap:8px}
.methods summary::-webkit-details-marker{display:none}
.methods summary .exp{margin-left:auto;color:var(--purple-2);font-weight:800;font-size:16px}
.methods[open] summary .exp{transform:rotate(45deg)}
.methods ul{margin:14px 0 0;padding-left:18px}
.methods li{font-size:11.5px;color:var(--muted);line-height:1.6;margin-bottom:7px}

.foot{max-width:1240px;margin:0 auto;padding:0 22px 40px;text-align:center;color:var(--muted-2);font-size:11.5px}
.foot b{color:var(--purple)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--purple);color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:10px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:all .25s;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:920px){ .shell{grid-template-columns:1fr;max-width:620px} }

  // rounded compact number for lists / country headlines (e.g. 325355 → "325K")
  const kfmt=n=> n>=1000000 ? (n/1000000).toFixed(n>=10000000?0:1)+"M"
                : n>=1000 ? Math.round(n/1000)+"K" : String(n);
  // conservative rounded headline for large blended totals (e.g. 928094 → "900K+")
  function roundedGlobal(val){
    if(val>=1000000) return (Math.floor(val/100000)/10).toFixed(1).replace(/\.0$/,'')+"M+";
    if(val>=100000)  return Math.floor(val/100000)*100+"K+";
    if(val>=10000)   return Math.round(val/1000)+"K+";
    return kfmt(val);
  }
  function esc(s){return String(s).replace(/[<>]/g,c=>({"<":"&lt;",">":"&gt;"}[c]));}

  const allCountries=()=>A.countries.concat([A.others]);
  const modeTotal=m=> allCountries().reduce((s,c)=>s+c[m],0);
  const channelTotalOf=m=> A.channels[m].reduce((s,x)=>s+x.value,0);

  /* ---------- PROFILE ---------- */
  function profile(){
    const m=DATA.meta;
    const chans=DATA.channels.map(c=>`<span class="chan">${esc(c.label)} <b>${esc(c.value)}</b></span>`).join("");
    const topics=m.topics.map(t=>`<span class="topic">${esc(t)}</span>`).join("");
    $("#profile").innerHTML=`
      <div class="p-toolbar">
        <span class="site">${esc(m.website)}</span>
        <button class="tbtn" id="shareBtn" aria-label="Copy link to this media kit">${ICON.share}Share</button>
        <a class="tbtn icon" href="${esc(m.websiteUrl)}" target="_blank" rel="noopener" aria-label="Open website in a new tab">${ICON.link}</a>
      </div>
      <div class="p-cover" aria-hidden="true"></div>
      <div class="p-body">
        <img class="p-avatar" src="${esc(m.avatar)}" alt="Portrait of ${esc(m.name)}">
        <div class="p-name"><h1>${esc(m.name)}</h1>${ICON.verified}</div>
        <div class="p-creds">${esc(m.credentials)}</div>
        <div class="p-badge"><span class="dot" aria-hidden="true"></span>Data through ${esc(m.updated)}</div>
        <div class="p-loc">${esc(m.location)}</div>
        <div class="p-total">${esc(m.totalLabel)}: <b>${esc(m.totalValue)}</b></div>
        <div class="p-sub">${esc(m.proLine)}</div>
        <div class="p-channels">${chans}</div>
        <div class="p-topics">${topics}</div>
        <p class="p-bio">${m.bio}</p>
        <a class="p-cta" href="${mail()}">Discuss a partnership</a>
        <a class="p-cta2" href="${esc(m.websiteUrl)}" target="_blank" rel="noopener">Visit the website →</a>
      </div>`;
  }

  /* ---------- STATIC DASH CARDS ---------- */
  function partnerCard(){
    const p=DATA.partner;
    const rows=p.rows.map(r=>`
      <div class="rate-row">
        <div class="rate-l"><div class="rt">${esc(r.t)}</div><div class="rd">${esc(r.d)}</div></div>
        <a class="rate-btn ${r.ghost?'ghost':''}" href="${mail()}">${esc(r.cta)} →</a>
      </div>`).join("");
    return `<section class="card card-pad"><div class="card-head"><h2 class="card-title">${esc(p.title)}</h2></div>${rows}<p class="note">${esc(p.note)}</p></section>`;
  }
  function campaignCard(){
    const c=DATA.campaign;
    const items=c.items.map(i=>`<div class="offer-item"><span class="ck" aria-hidden="true">✓</span><span>${esc(i)}</span></div>`).join("");
    return `<section class="card card-pad"><div class="card-head"><h2 class="card-title">${esc(c.title)}</h2></div><div class="offer-list">${items}</div><p class="note">${esc(c.note)}</p></section>`;
  }
  // Selected content examples: one card per real, published piece.
  function contentSamplesCard(){
    const S=DATA.samples;
    const cards=S.items.map(s=>{
      const thumb = s.image
        ? `<img src="${esc(s.image)}" alt="${esc(s.alt||s.title)}" loading="lazy" decoding="async">`
        : `<span class="s-fallback"><span>${esc(s.kicker||s.format||'')}</span></span>`;
      return `
      <a class="sample" href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">
        <span class="s-thumb">${thumb}</span>
        <span class="s-body">
          <span class="s-fmt">${esc(s.format)}</span>
          <span class="s-title" title="${esc(s.title)}">${esc(s.title)}</span>
          <span class="s-link">View example →</span>
        </span>
      </a>`;
    }).join("");
    return `<section class="card card-pad"><div class="card-head"><h2 class="card-title">${esc(S.title)}</h2></div><p class="note" style="margin-top:0;margin-bottom:14px">${esc(S.note)}</p><div class="samples">${cards}</div></section>`;
  }
  function brandCard(){
    const b=DATA.brands;
    const logos=b.logos.map(l=>`<div class="brand"><img src="${esc(l.src)}" alt="${esc(l.alt)}" style="max-height:${l.h}px"></div>`).join("");
    return `<section class="card card-pad"><div class="card-head"><h2 class="card-title">${esc(b.title)}</h2></div><div class="brands">${logos}</div><p class="brand-note">${esc(b.note)}</p></section>`;
  }
  function tilesCard(){
    const m=DATA.meta;
    // Newsletter sub built from data; the reporting period only shows once verified.
    const nlSub=`${m.newsletterOpenRate} average open rate${m.newsletterOpenRatePeriod?` · ${m.newsletterOpenRatePeriod}`:''} · 4 languages`;
    const t=DATA.tiles.map(x=>{
      const sub = x.dyn==="newsletter" ? nlSub : (x.sub||'');
      return `
      <div class="tile">
        <div class="tile-head"><span class="tile-ic">${ICON[x.icon]||''}${esc(x.label)}</span><span class="info" title="${esc(sub)}" aria-hidden="true">i</span></div>
        <div class="tile-val">${esc(x.value)}${x.unit?`<span class="u">${esc(x.unit)}</span>`:''}</div>
        <div class="tile-sub">${esc(sub)}</div>
      </div>`;
    }).join("");
    return `<div class="tiles">${t}</div>`;
  }
  // Proof of performance: only renders published cases (hidden otherwise).
  function performanceCard(){
    const P=DATA.performance;
    const pub=(P.cases||[]).filter(c=>c.published);
    if(!pub.length) return "";
    const cards=pub.map(c=>{
      // metrics[] is the current shape; primary/secondary kept for older entries.
      const mets=c.metrics||[c.primary,c.secondary].filter(Boolean);
      const res=mets.map(m=>`<div><div class="rv">${esc(m.value)}</div><div class="rl">${esc(m.label)}</div></div>`).join("");
      return `
      <div class="case${c.feature?' feature':''}">
        <div class="kick">${esc(c.kicker||c.topic||"")}</div>
        <h3>${esc(c.title)}</h3>
        <div class="cmeta">${esc(c.topic||"")}${c.format?` · ${esc(c.format)}`:""}${c.market?` · ${esc(c.market)}`:""}</div>
        ${c.blurb?`<p class="blurb">${esc(c.blurb)}</p>`:""}
        ${res?`<div class="res">${res}</div>`:""}
        ${c.disclaimer?`<div class="disc">${esc(c.disclaimer)}</div>`:""}
      </div>`;
    }).join("");
    return `<section class="card card-pad"><div class="card-head"><h2 class="card-title">${esc(P.title)}</h2></div><p class="note" style="margin-top:0;margin-bottom:14px">${esc(P.note)}</p><div class="cases">${cards}</div>${P.closer?`<p class="note" style="margin-top:14px">${esc(P.closer)}</p>`:""}</section>`;
  }

  // Progressive disclosure: the positioning narrative, hidden until clicked.
  function deepDiveCard(){
    const D=DATA.deepDive;
    const para=a=>(a||[]).map(t=>`<p>${esc(t)}</p>`).join("");
    const rows=D.sections.map(s=>{
      const points=s.points?`<div class="dd-points">${s.points.map(p=>`<div class="dp"><div class="dt">${esc(p.t)}</div><div class="dd2">${esc(p.d)}</div></div>`).join("")}</div>`:"";
      const nums=s.numbered?`<div class="dd-num">${s.numbered.map((p,i)=>`<div class="dn"><span class="ix" aria-hidden="true">${i+1}</span><div><div class="dt">${esc(p.t)}</div><div class="dd2">${esc(p.d)}</div></div></div>`).join("")}</div>`:"";
      const pull=s.pull?`<div class="dd-pull">${esc(s.pull)}</div>`:"";
      return `<details class="dd" id="dd-${esc(s.id)}">
        <summary>
          <span class="dd-x" aria-hidden="true">＋</span>
          <span class="dd-txt"><span class="dd-t">${esc(s.title)}</span><span class="dd-s">${esc(s.teaser)}</span></span>
        </summary>
        <div class="dd-body">${para(s.body)}${pull}${points}${nums}${para(s.after)}</div>
      </details>`;
    }).join("");
    return `<section class="card card-pad"><div class="card-head"><h2 class="card-title">${esc(D.title)}</h2></div><p class="dd-note">${esc(D.note)}</p>${rows}</section>`;
  }
  function methodologyCard(){
    const M=DATA.methodology;
    const li=M.details.map(d=>`<li>${esc(d)}</li>`).join("");
    return `<section class="card card-pad"><details class="methods"><summary>${esc(M.title)}<span class="exp" aria-hidden="true">＋</span></summary><ul>${li}</ul></details></section>`;
  }

  /* ---------- AUDIENCE (interactive) ---------- */
  function audienceShell(){
    const opts=`<option value="global">🌍 Global</option>`+
      allCountries().map(c=>`<option value="${c.id}">${c.flag} ${esc(c.name)}</option>`).join("");
    const ageBars=A.age.map(g=>{
      const max=Math.max(...A.age.map(x=>x.v));
      return `<div class="hbar"><span class="hb-l">${esc(g.label)}</span><span class="hb-t"><span class="hb-f" data-w="${Math.round(g.v/max*100)}"></span></span><span class="hb-v">${g.v}%</span></div>`;
    }).join("");
    // age caption computed from the data (sum of 35–44 and older) so it stays accurate on update
    const age35=Math.round(A.age.filter(a=>parseInt(a.label,10)>=35).reduce((s,a)=>s+a.v,0));
    const pro=A.pro.map(p=>`<div class="p"><div class="pn">${p.n}<b>${p.u}</b></div><div class="pl">${esc(p.l)}</div></div>`).join("");
    const engStats=A.engagement.stats.map(s=>`<div class="p"><div class="pn">${esc(s.n)}<b>${esc(s.u||'')}</b></div><div class="pl">${esc(s.l)}</div></div>`).join("");

    // Gender + age demographics (moved BELOW the LinkedIn professional/employer/engagement blocks).
    const demoGrid=`
      <div class="aud-grid" style="margin-top:16px">
        <div class="subcard">
          <div class="sh">${ICON.gender}Gender <span class="tag">· FB + Instagram</span></div>
          <div class="donut-wrap">
            <div class="donut" style="--male:${A.gender.male}%" role="img" aria-label="Gender split: ${A.gender.female}% female, ${A.gender.male}% male"></div>
            <div class="legend">
              <div class="lg"><span class="k" style="background:var(--purple)" aria-hidden="true"></span><span class="name">Female</span><span class="v">${A.gender.female}%</span></div>
              <div class="lg"><span class="k" style="background:var(--coral)" aria-hidden="true"></span><span class="name">Male</span><span class="v">${A.gender.male}%</span></div>
            </div>
          </div>
        </div>
        <div class="subcard">
          <div class="sh">${ICON.cal}Age <span class="tag">· FB + Instagram</span></div>
          <div class="hbars">${ageBars}</div>
          <p class="note" style="margin-top:11px">${esc(A.ageNote.replace('{pct}', age35))}</p>
        </div>
      </div>`;

    return `<section class="card card-pad">
      <div class="card-head">
        <h2 class="card-title">Audience &amp; visibility</h2>
        <span class="selwrap"><select class="country" id="countrySel" aria-label="Select a market">${opts}</select>${ICON.chevron}</span>
      </div>

      <div class="toggle" role="group" aria-label="Metric type" style="margin-bottom:14px">
        <button id="mReach" aria-pressed="true" aria-label="Show content visibility">${ICON.reach}Visibility</button>
        <button id="mFollow" aria-pressed="false" aria-label="Show committed followers">${ICON.heart}Followers</button>
      </div>

      <div class="geo-readout" id="geoReadout" aria-live="polite"></div>

      <div class="subcard" style="margin-bottom:16px">
        <div class="sh">${ICON.globe}<span id="mixTitle">Where the visibility comes from</span> <span class="tag" id="mixSub"></span></div>
        <div class="mixbar" id="mixBar"></div>
        <div class="mixlegend" id="mixLegend"></div>
      </div>

      <div class="subcard" style="margin-top:16px">
        <div class="sh">${ICON.audience}Professional layer <span class="tag">· LinkedIn</span></div>
        <div class="pro">${pro}</div>
      </div>

      <div class="subcard" style="margin-top:16px">
        <div class="sh">${ICON.reach}${esc(A.engagement.title)}</div>
        <div class="pro pro3">${engStats}</div>
      </div>

      ${demoGrid}

      <div class="subcard" style="margin-top:16px">
        <div class="sh">${ICON.globe}<span id="ctyTitle">Top markets by visibility</span></div>
        <div id="countryRows"></div>
      </div>

      <p class="note" id="audNote">${A.note}</p>
    </section>`;
  }

  function renderMix(){
    const list=[...A.channels[MODE]].sort((a,b)=>b.value-a.value);  // biggest segment first
    const total=list.reduce((s,c)=>s+c.value,0);
    $("#mixTitle").textContent = MODE==="reach" ? "Where the visibility comes from" : "Where the audience follows";
    $("#mixSub").innerHTML = "· "+A.modeMeta[MODE].sub;
    $("#mixBar").innerHTML = list.map(c=>`<span class="mixseg" title="${esc(c.label)}: ${esc(c.note||'')}" style="width:${(c.value/total*100).toFixed(2)}%;background:${c.color}"></span>`).join("");
    $("#mixLegend").innerHTML = list.map(c=>`<span class="ml" title="${esc(c.note||'')}"><span class="mk" style="background:${c.color}" aria-hidden="true"></span>${esc(c.label)} <span class="mv">${kfmt(c.value)}</span>${c.annualized?' <span class="est-dot">annualized</span>':''}</span>`).join("");
  }

  function renderGeo(){
    const isGlobal = SEL==="global";
    const mm=A.modeMeta[MODE];
    let c;
    if(isGlobal){
      c={flag:"🌍", name:"Global", lang:"EN · FR · ES · PT", channel:"Blog + social", val:channelTotalOf(MODE)};
    } else {
      const src=allCountries().find(x=>x.id===SEL)||A.countries[0];
      c={flag:src.flag, name:src.name, lang:src.lang, channel:src.channel, val:src[MODE]};
    }
    const countrySum = modeTotal(MODE);            // shares are relative to the country map
    const share = countrySum? Math.round(c.val/countrySum*100) : 0;
    const lbl = isGlobal ? `${mm.label} · all markets` : `${mm.label} · ${esc(c.name)}`;
    // Global keeps the blended-metric explanation; a selected country gets a discreet "estimated" qualifier.
    const subline = isGlobal ? mm.sub : A.countrySub[MODE];
    const meta = isGlobal
      ? `<span class="gm">${A.countries.length} key markets shown</span><span class="gm">${esc(DATA.meta.countriesReached)} countries and territories reached</span>`
      : `<span class="gm">Share <b>${share}%</b></span><span class="gm">Language <b>${esc(c.lang)}</b></span><span class="gm">Top channel <b>${esc(c.channel)}</b></span>`;
    $("#geoReadout").innerHTML=`
      <span class="flag" aria-hidden="true">${c.flag}</span>
      <div class="col">
        <div class="big">${isGlobal ? roundedGlobal(c.val) : kfmt(c.val)}</div>
        <div class="lbl">${lbl}</div>
        <div class="subline">${subline}</div>
      </div>
      <div class="col"><div class="geo-meta">${meta}</div></div>`;
  }

  function renderCountries(){
    $("#ctyTitle").textContent = MODE==="reach" ? "Top markets by visibility" : "Top markets by followers";
    const sorted=[...A.countries].sort((a,b)=>b[MODE]-a[MODE]);
    const top=sorted.slice(0,10);
    const max=top[0][MODE];
    const rowHtml=(c,rest)=>`
      <div class="crow ${rest?'rest':''} ${SEL===c.id?'active':''}" data-c="${c.id}" role="button" tabindex="0" aria-label="${esc(c.name)}: ${kfmt(c[MODE])}">
        <span class="cf" aria-hidden="true">${c.flag}</span>
        <span class="cn">${esc(c.name)}</span>
        <span class="cv">${kfmt(c[MODE])}</span>
        <span class="cbar"><i style="width:${Math.round(c[MODE]/max*100)}%"></i></span>
      </div>`;
    $("#countryRows").innerHTML = top.map(c=>rowHtml(c,false)).join("") + rowHtml(A.others,true);
    document.querySelectorAll("#countryRows .crow").forEach(r=>{
      const go=()=>setCountry(r.dataset.c);
      r.addEventListener("click",go);
      r.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } });
    });
  }

  // keep both ?market= and ?mode= in the URL so deep links preserve the full state
  function syncUrl(){
    const url=new URL(location.href);
    if(SEL==="global") url.searchParams.delete("market"); else url.searchParams.set("market",SEL);
    if(MODE==="followers") url.searchParams.set("mode","followers"); else url.searchParams.delete("mode");
    history.replaceState(null,"",url);
  }
  function setMode(m){
    MODE=m;
    $("#mReach").setAttribute("aria-pressed", String(m==="reach"));
    $("#mFollow").setAttribute("aria-pressed", String(m==="followers"));
    renderGeo(); renderMix(); renderCountries(); syncUrl();
  }
  function setCountry(id){
    SEL=id;
    if($("#countrySel").value!==id) $("#countrySel").value=id;
    renderGeo(); renderCountries(); syncUrl();
  }

  function footer(){
    const m=DATA.meta;
    $("#foot").innerHTML=`<b>${esc(m.name)}</b> · ${esc(m.credentials)} · ${esc(m.website)} · <a href="${mail()}" style="color:var(--coral-ink);font-weight:600">${esc(m.email)}</a><br><span style="opacity:.85">Partnership media kit · Data through ${esc(m.updated)}</span>`;
  }

  /* ---------- RUNTIME RECONCILIATION CHECK (dev console only; never shown to visitors) ---------- */
  function validate(){
    const warn=(a,b,label)=>{ if(Math.abs(a-b)>0){ console.warn(`[media-kit] reconciliation mismatch: ${label}: ${a.toLocaleString()} vs ${b.toLocaleString()} (Δ ${a-b})`); } };
    const rCh=channelTotalOf("reach"),      rCty=modeTotal("reach");
    const fCh=channelTotalOf("followers"),  fCty=modeTotal("followers");
    warn(rCh, rCty, "reach: channel total vs country total");
    warn(fCh, fCty, "followers: channel total vs country total");
    // cross-platform displayed figure (rounded) should be within 1K of the exact channel total
    const shown=parseFloat(String(DATA.meta.totalValue).replace(/[^\d.]/g,""))*1000;
    if(Math.abs(shown-fCh)>1000) console.warn(`[media-kit] profile cross-platform total ${DATA.meta.totalValue} deviates from ${fCh.toLocaleString()}`);
    console.info(`[media-kit] totals OK: visibility ${rCh.toLocaleString()}, followers ${fCh.toLocaleString()}`);
  }

  /* ---------- MOUNT ---------- */
  profile();
  $("#dash").innerHTML = partnerCard()+campaignCard()+contentSamplesCard()+brandCard()+tilesCard()+performanceCard()+audienceShell()+deepDiveCard()+methodologyCard();
  footer();

  // initial state + deep link (?market=fr&mode=followers)
  const params=new URLSearchParams(location.search);
  const startMarket=(params.get("market")||"global").toLowerCase();
  const validMarket = startMarket==="global" || allCountries().some(c=>c.id===startMarket);
  SEL = validMarket?startMarket:"global";
  MODE = params.get("mode")==="followers" ? "followers" : "reach";
  $("#countrySel").value=SEL;
  setMode(MODE); setCountry(SEL);

  $("#countrySel").addEventListener("change",()=>setCountry($("#countrySel").value));
  $("#mReach").addEventListener("click",()=>setMode("reach"));
  $("#mFollow").addEventListener("click",()=>setMode("followers"));

  $("#shareBtn").addEventListener("click",async()=>{
    try{ await navigator.clipboard.writeText(location.href); toast("Link copied"); }
    catch{ toast("Copy this page's URL"); }
  });
  function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}

  requestAnimationFrame(()=>document.querySelectorAll(".hb-f").forEach(f=>f.style.width=(f.dataset.w||0)+"%"));
  validate();
})();
</script>
</body>
</html>
